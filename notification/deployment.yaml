apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: lab4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: ghcr.io/ilyavorwork/notification-service:latest
          imagePullPolicy: Always
          livenessProbe:
            httpGet:
              path: /health?probe=liveness
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health?probe=readiness
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3




